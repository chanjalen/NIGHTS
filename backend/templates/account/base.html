<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block head_title %}NITE{% endblock %}</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:#0a0814;
      color:#f0edf8;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      display:flex;align-items:center;justify-content:center;
      padding:24px;
      background-image:
        radial-gradient(ellipse 80% 60% at 70% 50%,rgba(90,53,144,.25) 0%,transparent 60%),
        radial-gradient(ellipse 60% 40% at 20% 80%,rgba(212,24,108,.15) 0%,transparent 50%);
    }
    .card{
      background:rgba(10,8,20,.8);
      backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.1);
      border-radius:8px;
      padding:52px 48px;
      width:100%;max-width:440px;
      text-align:center;
      box-shadow:0 0 80px rgba(212,24,108,.18),0 0 140px rgba(90,53,144,.12),0 24px 64px rgba(0,0,0,.5);
    }
    .brand{
      font-size:30px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;
      background:linear-gradient(135deg,#d4186c 0%,#5a3590 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      display:block;margin-bottom:32px;text-decoration:none;
    }
    h1{font-size:22px;font-weight:800;margin-bottom:8px;color:#f0edf8}
    .subtitle{color:rgba(240,237,248,.6);font-size:14px;line-height:1.65;margin-bottom:28px}
    .google-btn{
      display:flex;align-items:center;justify-content:center;gap:12px;
      width:100%;padding:14px 20px;
      background:#fff;color:#1f1f1f;
      border:none;border-radius:4px;
      font-size:14px;font-weight:600;
      text-decoration:none;
      transition:box-shadow .2s,transform .15s;
      margin-bottom:20px;
    }
    .google-btn:hover{box-shadow:0 4px 24px rgba(255,255,255,.18);transform:translateY(-1px)}
    .terms{font-size:11px;color:rgba(240,237,248,.35)}
    .messages{margin-bottom:20px;text-align:left}
    .message{padding:10px 14px;border-radius:4px;font-size:13px;margin-bottom:8px}
    .message.error,.message.alert,.message.danger{background:rgba(212,24,108,.1);border:1px solid rgba(212,24,108,.3);color:#ff6db3}
    .message.success{background:rgba(80,200,120,.1);border:1px solid rgba(80,200,120,.3);color:#50c878}
    .back-link{display:inline-block;margin-top:16px;font-size:13px;color:rgba(240,237,248,.5);text-decoration:none}
    .back-link:hover{color:#d4186c}
  </style>
</head>
<body>
  <div class="card">
    <a href="{{ FRONTEND_URL }}" class="brand">NITE</a>
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
