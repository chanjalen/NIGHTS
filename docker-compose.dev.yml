# DEV / STAGING backend stack (develop branch). Runs as its own compose project
# from the ~/nite-dev clone, pointed at the nite-dev database. The prod Caddy
# (docker-compose.prod.yml) routes api-dev.findyournights.com here via the shared
# external "nite-edge" network.
#   cd ~/nite-dev && docker compose -f docker-compose.dev.yml up -d --build
#
# Requires the shared network first:  docker network create nite-edge
# Secrets live in this clone's .env.dev (chmod 600) + backend/secrets/.

services:
  redis-dev:
    image: redis:7-alpine
    restart: unless-stopped

  api-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env.dev
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_MIGRATIONS: "1"
      REDIS_HOST: redis-dev
    volumes:
      - ./backend/secrets:/app/secrets:ro
    networks:
      - default   # reach redis-dev (same project)
      - edge      # let the prod Caddy reach this as "api-dev"
    depends_on:
      - redis-dev

  worker-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env.dev
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      REDIS_HOST: redis-dev
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 256
    volumes:
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      - redis-dev

networks:
  edge:
    external: true
    name: nite-edge
