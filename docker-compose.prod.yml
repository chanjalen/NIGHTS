# PRODUCTION backend stack (main branch) + the single shared Caddy edge proxy.
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy also routes api-dev.findyournights.com to the DEV stack, which runs as a
# separate compose project (docker-compose.dev.yml, from the ~/nite-dev clone on
# the develop branch). They connect via the external "nite-edge" network, which
# must be created once:  docker network create nite-edge
#
# Secrets live in .env.prod (chmod 600) + backend/secrets/. Only Caddy publishes
# ports — api/redis are reachable only on internal Docker networks.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default   # reach prod `api` (same project)
      - edge      # reach `api-dev` (the dev compose project)
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_MIGRATIONS: "1"
      REDIS_HOST: redis
    volumes:
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      REDIS_HOST: redis
    # Resource caps so a malicious/huge upload can't exhaust the host.
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 256
    volumes:
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      - redis

networks:
  edge:
    external: true
    name: nite-edge

volumes:
  caddy_data:
  caddy_config:
