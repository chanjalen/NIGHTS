# Production + dev backend stacks on one box, fronted by a single Caddy that
# terminates TLS (auto Let's Encrypt) and reverse-proxies by subdomain.
#
# The backend services run prebuilt images from GHCR (built by CI on push):
#   prod  -> :${PROD_TAG:-prod}   dev -> :${DEV_TAG:-dev}
# Pin a specific build for rollback, e.g.  PROD_TAG=sha-<commit> docker compose ... up -d api worker
#
#   docker compose -f docker-compose.prod.yml up -d   # pulls images, no local build
#
# Secrets live in .env.prod / .env.dev (chmod 600, gitignored) at the repo root,
# and the CloudFront signing key under backend/secrets/. Only Caddy publishes
# ports — api/redis are reachable only on the internal compose network.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - api-dev

  # ── Production (api.findyournights.com → nite-prod DB) ───────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    image: ghcr.io/chanjalen/nights-backend:${PROD_TAG:-prod}
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_MIGRATIONS: "1"
      REDIS_HOST: redis
    volumes:
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      - redis

  worker:
    image: ghcr.io/chanjalen/nights-backend:${PROD_TAG:-prod}
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      REDIS_HOST: redis
    # Resource caps so a malicious/huge upload can't exhaust the host.
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 256
    volumes:
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      - redis

  # ── Dev / staging (api-dev.findyournights.com → nite-dev DB) ────────────────
  redis-dev:
    image: redis:7-alpine
    restart: unless-stopped

  api-dev:
    image: ghcr.io/chanjalen/nights-backend:${DEV_TAG:-dev}
    restart: unless-stopped
    env_file: .env.dev
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      RUN_MIGRATIONS: "1"
      REDIS_HOST: redis-dev
    volumes:
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      - redis-dev

  worker-dev:
    image: ghcr.io/chanjalen/nights-backend:${DEV_TAG:-dev}
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file: .env.dev
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      REDIS_HOST: redis-dev
    mem_limit: 1g
    cpus: 1.5
    pids_limit: 256
    volumes:
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      - redis-dev

volumes:
  caddy_data:
  caddy_config:
